# Tambear recipe spec for acsc (arccosecant).
#
# acsc(x) = asin(1/x). Domain: |x| ≥ 1. Range: [−π/2, π/2] excluding 0.

[recipe]
name = "acsc"
layer = "recipe"
family = ["libm", "trigonometric", "inverse", "elementary"]
description = "Arccosecant acsc(x) = asin(1/x) for |x| ≥ 1, range [−π/2, π/2] \\ {0}."

long_description = """
acsc(x) = asin(1/x). Domain: (−∞, −1] ∪ [1, +∞).

Algorithm:
1. Compute 1/x (compensated for |x| near 1).
2. Apply the asin kernel to 1/x.
3. Near |x| = 1 (i.e. 1/x ≈ ±1): uses the DD sqrt large-argument path from asin.

Special cases:
• acsc(NaN) = NaN
• acsc(x) = NaN for |x| < 1
• acsc(1) = π/2, acsc(−1) = −π/2
• acsc(+∞) = 0, acsc(−∞) = −0
"""

[[recipe.references]]
citation = "DLMF 4.23"
kind = "reference"
note = "Digital Library of Mathematical Functions — inverse trig"

# ── Decomposition ────────────────────────────────────────────────────────────

[decomposition]
primitives_used = ["fdiv", "fmadd", "fsqrt", "compensated_horner", "dd_sqrt"]
kingdom = "A"

# ── Sharing contract ─────────────────────────────────────────────────────────

[sharing]
reads  = ["asincos_sqrt"]
writes = []

# ── Parameters ───────────────────────────────────────────────────────────────

[[parameters]]
key = "precision"
display_name = "Precision strategy"
description = "strict / compensated / correctly_rounded."
kind = "method"
advanced = false

[parameters.default]
using = "compensated"

[parameters.domain]
kind = "enum"
values = ["strict", "compensated", "correctly_rounded"]

[[parameters]]
key = "angle_unit"
display_name = "Output angle unit"
description = "radians / degrees / gradians / turns / pi_scaled."
kind = "method"
advanced = false

[parameters.default]
using = "radians"

[parameters.domain]
kind = "enum"
values = ["radians", "degrees", "gradians", "turns", "pi_scaled"]

[[parameters]]
key = "out_of_range"
display_name = "Out-of-range behavior"
description = "nan / clamp / error for |x| < 1."
kind = "method"
advanced = true

[parameters.default]
using = "nan"

[parameters.domain]
kind = "enum"
values = ["nan", "clamp", "error"]

# ── Outputs ──────────────────────────────────────────────────────────────────

[[outputs]]
semantic_name = "result"
description = "acsc(x) ∈ [−π/2, π/2] \\ {0}."
dtype = "f64"
has_v_column = false

[outputs.shape]
kind = "vector"
length_from = "input_rows"

[writeup]
methods_template = "Arccosecant via asin(1/x). Precision: {precision}. Output unit: {angle_unit}."
