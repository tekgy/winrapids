# Tambear recipe spec for asin (arcsine).

[recipe]
name = "asin"
layer = "recipe"
family = ["libm", "trigonometric", "inverse", "elementary"]
description = "Arcsine function asin(x) ∈ [−π/2, π/2] for x ∈ [−1, 1]."

long_description = """
asin(x) — the principal value of the inverse sine, with range [−π/2, π/2].

Algorithm (fdlibm / Cody-Waite lineage):
1. Special cases: |x| > 1 → NaN; |x| = 1 → ±π/2; x = 0 → 0.
2. Small values |x| < 2^−28: asin(x) ≈ x (error < ½ ulp).
3. Medium values |x| ≤ 0.5: asin(x) = x + x·P(x²) where P is a minimax
   polynomial on [0, 0.25] approximating (asin(x)/x − 1)/x². Degree-11 polynomial
   in z = x², fit in mpmath via Remez exchange at 80-digit precision.
4. Large values 0.5 < |x| ≤ 1: use the identity
   asin(x) = π/2 − 2·asin(√((1−x)/2)).
   This maps the hard near-1 region to the well-conditioned near-0 region.
   The inner √ is computed as a compensated sqrt.

Output range: [−π/2, π/2]. Output unit follows angle_unit parameter.

Special cases:
• asin(NaN) = NaN
• asin(x) = NaN for |x| > 1
• asin(0) = 0, asin(-0) = -0
• asin(1) = π/2, asin(-1) = -π/2
"""

[[recipe.references]]
citation = "Muller et al. 2018"
kind = "textbook"
note = "Handbook of Floating-Point Arithmetic, ch. 11"

[[recipe.references]]
citation = "Sun fdlibm e_asin.c"
kind = "implementation"
note = "Reference structure"

[[recipe.references]]
citation = "Cody & Waite 1980"
kind = "book"
note = "Software Manual for the Elementary Functions — ch. 5"

# ── Decomposition ────────────────────────────────────────────────────────────

[decomposition]
primitives_used = [
    "fmadd",
    "fsqrt",
    "compensated_horner",
    "dd_sqrt",
]
kingdom = "A"

# ── Sharing contract ─────────────────────────────────────────────────────────

[sharing]
# asin and acos share the large-argument sqrt computation.
reads  = ["asincos_sqrt"]
writes = ["asincos_sqrt"]

# ── Parameters ───────────────────────────────────────────────────────────────

[[parameters]]
key = "precision"
display_name = "Precision strategy"
description = """
• strict: single-FMA Horner polynomial, standard sqrt. ≤ 2 ulps.
• compensated: compensated Horner + DD-corrected sqrt. ≤ 1 ulp.
• correctly_rounded: DD working precision throughout. ≤ 1 ulp on tested samples.
"""
kind = "method"
advanced = false

[parameters.default]
using = "compensated"

[parameters.domain]
kind = "enum"
values = ["strict", "compensated", "correctly_rounded"]

# ─────────────────────────────────────────────────────────────────────────────

[[parameters]]
key = "angle_unit"
display_name = "Output angle unit"
description = """
Unit of the output angle.
• radians: output in [−π/2, π/2].
• degrees: output in [−90, 90].
• gradians: output in [−100, 100].
• turns: output in [−0.25, 0.25].
• pi_scaled: output in [−0.5, 0.5] (i.e. result/π).
"""
kind = "method"
advanced = false

[parameters.default]
using = "radians"

[parameters.domain]
kind = "enum"
values = ["radians", "degrees", "gradians", "turns", "pi_scaled"]

# ─────────────────────────────────────────────────────────────────────────────

[[parameters]]
key = "out_of_range"
display_name = "Out-of-range behavior"
description = """
How to handle |x| > 1.
• nan: return NaN (IEEE 754 default).
• clamp: clamp x to [−1, 1] before evaluation (returns ±π/2).
• error: panic (useful in checked contexts).
"""
kind = "method"
advanced = true

[parameters.default]
using = "nan"

[parameters.domain]
kind = "enum"
values = ["nan", "clamp", "error"]

# ── Outputs ──────────────────────────────────────────────────────────────────

[[outputs]]
semantic_name = "result"
description = "asin(x) ∈ [−π/2, π/2] (or converted to the selected angle unit)."
dtype = "f64"
has_v_column = false

[outputs.shape]
kind = "vector"
length_from = "input_rows"

# ── Writeup metadata ─────────────────────────────────────────────────────────

[writeup]
methods_template = """
The arcsine was evaluated using tambear's native implementation.
Precision strategy: {precision}. Output unit: {angle_unit}.
Out-of-range behavior: {out_of_range}.
"""
