# Tambear recipe spec for csc (cosecant).
#
# csc(x) = 1/sin(x). Poles at x = kπ.

[recipe]
name = "csc"
layer = "recipe"
family = ["libm", "trigonometric", "elementary", "periodic"]
description = "Cosecant function csc(x) = 1/sin(x) with three precision strategies."

long_description = """
csc(x) = 1/sin(x). Poles at x = kπ, k ∈ ℤ.

Algorithm: same range reduction as sin/cos. On the reduced interval with q even,
sin_k can be small (near kπ inputs), so csc grows large. Near 0, csc(x) ≈ 1/x
and the naive reciprocal of the kernel gives the right answer because the Horner
polynomial preserves the sign and magnitude of the leading r term.

Special cases:
• csc(NaN) = NaN, csc(±∞) = NaN.
• csc(0) = ±∞ (IEEE: +∞ from +0, −∞ from −0).
• For tiny |x|: csc(x) ≈ 1/x (returned via kernel reciprocal without polynomial error).
"""

[[recipe.references]]
citation = "DLMF 4.14"
kind = "reference"
note = "Digital Library of Mathematical Functions — trigonometric functions"

[[recipe.references]]
citation = "Muller et al. 2018"
kind = "textbook"
note = "Handbook of Floating-Point Arithmetic, ch. 11"

# ── Decomposition ────────────────────────────────────────────────────────────

[decomposition]
primitives_used = [
    "frint", "fmadd", "compensated_horner",
    "payne_hanek_rem_pio2", "cody_waite_rem_pio2",
    "fdiv",
]
kingdom = "A"

# ── Sharing contract ─────────────────────────────────────────────────────────

[sharing]
reads  = ["trig_reduce", "sincos_kernel"]
writes = ["trig_reduce", "sincos_kernel"]

# ── Parameters ───────────────────────────────────────────────────────────────

[[parameters]]
key = "precision"
display_name = "Precision strategy"
description = "strict / compensated / correctly_rounded."
kind = "method"
advanced = false

[parameters.default]
using = "compensated"

[parameters.domain]
kind = "enum"
values = ["strict", "compensated", "correctly_rounded"]

# ─────────────────────────────────────────────────────────────────────────────

[[parameters]]
key = "angle_unit"
display_name = "Angle unit"
description = "radians / degrees / gradians / turns / pi_scaled."
kind = "method"
advanced = false

[parameters.default]
using = "radians"

[parameters.domain]
kind = "enum"
values = ["radians", "degrees", "gradians", "turns", "pi_scaled"]

# ─────────────────────────────────────────────────────────────────────────────

[[parameters]]
key = "range_reduction"
display_name = "Range reduction algorithm"
description = "auto / cody_waite / payne_hanek."
kind = "method"
advanced = true

[parameters.default]
using = "auto"

[parameters.domain]
kind = "enum"
values = ["auto", "cody_waite", "payne_hanek"]

# ── Outputs ──────────────────────────────────────────────────────────────────

[[outputs]]
semantic_name = "result"
description = "csc(x) evaluated element-wise."
dtype = "f64"
has_v_column = false

[outputs.shape]
kind = "vector"
length_from = "input_rows"

# ── Writeup metadata ─────────────────────────────────────────────────────────

[writeup]
methods_template = """
Cosecant evaluated via reciprocal sine kernel. Precision: {precision}. Reduction: {range_reduction}. Angle unit: {angle_unit}.
"""
