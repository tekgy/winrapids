# Tambear recipe spec for sinh (hyperbolic sine).

[recipe]
name = "sinh"
layer = "recipe"
family = ["libm", "hyperbolic", "elementary"]
description = "Hyperbolic sine sinh(x) = (e^x − e^−x)/2 with three precision strategies."

long_description = """
sinh(x) = (e^x − e^−x)/2.

The naive formula has catastrophic cancellation for small |x| (e^x − e^−x ≈ 0
when |x| is tiny). Three sub-interval strategies avoid this:

1. Tiny |x| < 2^−28: sinh(x) ≈ x (relative error < ½ ulp).
2. Small |x| ≤ 1: sinh(x) = x + x·P(x²) where P is a minimax polynomial
   approximating (sinh(x) − x)/x³ on [0, 1]. Degree-7 polynomial in z = x²,
   fit in mpmath via Remez at 80-digit precision.
3. Medium 1 < |x| ≤ 22: sinh(x) = (e^x − 1/e^x)/2 via exp + exp reciprocal.
   Both e^x and e^−x computed via the shared exp primitive; the subtraction
   is safe because both terms are ≥ 1 (no cancellation when |x| ≥ 1).
4. Large |x| > 22: sinh(x) ≈ sign(x)·e^|x|/2. The e^−x term contributes
   < 2^−52 relative to e^x and can be dropped.
5. Overflow threshold: |x| > 710.47… → ±∞.

Special cases:
• sinh(NaN) = NaN
• sinh(±∞) = ±∞
• sinh(0) = 0, sinh(-0) = -0
"""

[[recipe.references]]
citation = "Muller et al. 2018"
kind = "textbook"
note = "Handbook of Floating-Point Arithmetic, ch. 11"

[[recipe.references]]
citation = "Sun fdlibm e_sinh.c"
kind = "implementation"
note = "Five-sub-interval strategy reference"

# ── Decomposition ────────────────────────────────────────────────────────────

[decomposition]
primitives_used = [
    "fmadd", "compensated_horner",
    "exp_strict", "exp_compensated",
    "fdiv",
]
kingdom = "A"

# ── Sharing contract ─────────────────────────────────────────────────────────

[sharing]
reads  = ["exp_result"]
writes = ["exp_result", "coshsinh_kernel"]

# ── Parameters ───────────────────────────────────────────────────────────────

[[parameters]]
key = "precision"
display_name = "Precision strategy"
description = "strict / compensated / correctly_rounded."
kind = "method"
advanced = false

[parameters.default]
using = "compensated"

[parameters.domain]
kind = "enum"
values = ["strict", "compensated", "correctly_rounded"]

[[parameters]]
key = "overflow"
display_name = "Overflow behavior"
description = """
How to handle |x| > 710.47.
• inf: return ±∞ (IEEE 754 default).
• saturate: return the largest finite f64 with correct sign.
"""
kind = "method"
advanced = true

[parameters.default]
using = "inf"

[parameters.domain]
kind = "enum"
values = ["inf", "saturate"]

# ── Outputs ──────────────────────────────────────────────────────────────────

[[outputs]]
semantic_name = "result"
description = "sinh(x) evaluated element-wise."
dtype = "f64"
has_v_column = false

[outputs.shape]
kind = "vector"
length_from = "input_rows"

[writeup]
methods_template = "Hyperbolic sine. Precision: {precision}. Overflow: {overflow}."
